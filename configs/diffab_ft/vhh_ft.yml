# VHH fine-tune: luost26/DiffAb (SAbDab-trained, mostly paired Ab,
# minimal VHH exposure) → fine-tune on the 465 curated VHH+antigen
# entries (191 CDR clusters at 70% identity).
#
# This is the only fine-tune config. Earlier planning included a
# second "Arm B" starting from a public VHH-warmed checkpoint, but
# no such checkpoint exists publicly (Zenodo 16894086 is the ANDD
# dataset only). Single-arm is the right scope: π_ref needs to be
# VHH-aware enough for DPO to sharpen, not optimal in isolation.
#
# Mirror of base.yml with run-specific overrides ONLY at the bottom.
# Keep the model and train blocks in sync if base.yml changes.

model:
  type: diffab
  res_feat_dim: 128
  pair_feat_dim: 64
  diffusion:
    num_steps: 100
    eps_net_opt:
      num_layers: 6
  train_structure: true
  train_sequence: true

train:
  loss_weights:
    rot: 1.0
    pos: 1.0
    seq: 1.0
  max_iters: 20000
  val_freq: 200
  batch_size: 8
  seed: 42
  max_grad_norm: 1.0
  ema_decay: 0.999
  early_stop_patience: 20
  save_top_k: 3
  optimizer:
    type: adam
    lr: 1.0e-5
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.5
    patience: 8
    min_lr: 1.0e-6
  # Linear warmup of the optimizer LR from 0 → optimizer.lr over `max_iters`
  # iterations, applied multiplicatively on top of the plateau scheduler.
  # Needed because Adam's second-moment buffers are reset on fine-tune
  # restart; without warmup the first ~1000 steps overshoot and damage the
  # pretrained init (observed empirically on seed42: train/loss climbed
  # from iter 0). Stepped once per training iteration in train.py.
  warmup:
    max_iters: 1000

dataset:
  train:
    type: vhh_andd
    manifest_path: data/datasets/diffab_manifest.tsv
    pdb_dir:       /projects/0/hpmlprjs/interns/krijn/ANDD_nano_dataset_IgLM/VHH_structures_post_diffab
    processed_dir: data/processed/vhh_ft   # arm-specific LMDB
    splits_path:   data/datasets/clustering/cluster_splits.json
    split: train
    # Multi-CDR scope (H1+H2+H3): the proposal's TNP/Rosetta/Biology judges
    # evaluate whole-structure properties (global PSH, CDR-vicinity PPC
    # spanning all three CDRs, whole-structure energies), so π_ref must be
    # a competent generator for any CDR. AbDPO restricts to CDR-H3 only
    # (Zhou et al., NeurIPS 2024); seed42_v2 was the AbDPO-faithful
    # ablation. seed42_v3 extends scope to multi-CDR to align with this
    # thesis's broader judges. mask_multiple_cdrs randomly masks 1–N of
    # the available CDRs per example (N=3 for VHH heavy-only).
    transform:
      - type: mask_multiple_cdrs
      - type: merge_chains
      - type: patch_around_anchor

  val:
    type: vhh_andd
    manifest_path: data/datasets/diffab_manifest.tsv
    pdb_dir:       /projects/0/hpmlprjs/interns/krijn/ANDD_nano_dataset_IgLM/VHH_structures_post_diffab
    processed_dir: data/processed/vhh_ft
    splits_path:   data/datasets/clustering/cluster_splits.json
    split: val
    # Match train scope to avoid the train/val objective asymmetry that
    # afflicted seed42 (train multi-CDR vs val CDR3-only). Worker-RNG
    # seeding in train.py (_val_worker_init_fn) keeps masking deterministic
    # across validation passes despite mask_multiple_cdrs's per-example
    # randomness, so val/loss remains a stable early-stop signal.
    transform:
      - type: mask_multiple_cdrs
      - type: merge_chains
      - type: patch_around_anchor

# ── Run-specific ──
# Off-tree weight storage (industry standard): the source repo holds
# code + configs only; pretrained weights live on project scratch
# alongside the curated PDBs and the venv. Mirrors the location
# convention already used for `pdb_dir` above.
#
# Download once on Snellius (login node, with the DPO venv active):
#     huggingface-cli download luost26/DiffAb \
#         --local-dir /projects/0/hpmlprjs/interns/krijn/checkpoints/diffab
#
# train.py accepts absolute paths as-is (no project-root prefixing).
init_checkpoint: /projects/0/hpmlprjs/interns/krijn/checkpoints/diffab/codesign_multicdrs.pt
