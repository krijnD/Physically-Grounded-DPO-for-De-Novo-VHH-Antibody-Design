# VHH Diffusion-DPO on the J-anchor-fixed fine-tune (seed42_jfix).
#
# Inputs assumed present:
#   * π_ref checkpoint at
#       runs/vhh_ft/seed42_jfix/checkpoints/best_ema.pt
#     (29 MB, multi-CDR, post-J-anchor-fix LMDB; see
#      docs/post_jfix_dpo_handoff.md §1.)
#   * Pair parquet at
#       data/aapr/ftseed42_jfix_trainval_K8_20260525/dpo/pairs.parquet
#     (1492 pairs across 200 GTs — the production TRAIN+VAL AAPR run.
#      Selected by scripts/dpo/select_pareto_pairs.py. The 192-pair
#      TEST canary at data/aapr/ftseed42_jfix_K8_20260525/dpo/pairs.parquet
#      is retained for fast-iteration debugging only.)
#   * TRAIN+VAL GT structures in the LMDB at
#       data/processed/vhh_ft/   (the same LMDB the fine-tune reads;
#      its dataset.train.split below is set to 'train' to be valid,
#      but PairDataset's GT lookup is split-agnostic — see below.)
#
# This config is consumed by scripts/dpo/train_dpo.py via DiffAb's
# load_config (single yaml.safe_load, no merge). Mirror the model
# block from configs/diffab_ft/vhh_ft.yml so the architecture matches
# the π_ref checkpoint we initialize π_θ from.
#
# Locked decisions (see docs/dpo_training_context.md §"Locked"):
#   * π_θ initialized from π_ref weights; both share architecture.
#   * π_ref frozen end-to-end (handled in the trainer, not the config).
#   * Multi-CDR scope (H1+H2+H3) via mask_multiple_cdrs — same as the
#     fine-tune. AAPR sampling already used this mask.
#   * EMA on π_θ with decay 0.999.
#   * Composite loss across rot/pos/seq channels with fine-tune weights.
#
# Open hyperparameters worth ablating (see §"Open" in the design doc):
#   * dpo.beta_dpo  — temperature; start 0.1 per AbDPO Table 1.
#   * train.optimizer.lr — start 1e-5 (5× smaller than fine-tune lr=5e-5).
#   * dpo.aggregation — "residue" (AbDPO Eq. 8, default) vs "sequence"
#                       (Wallace scalar DPO) as ablation.

model:
  type: diffab
  res_feat_dim: 128
  pair_feat_dim: 64
  diffusion:
    num_steps: 100
    eps_net_opt:
      num_layers: 6
  train_structure: true
  train_sequence: true

train:
  # SEQ-ONLY: zero structural channels. Rationale from diag_lwref +
  # diag_trainer_path (2026-05-26):
  #   * rot/pos channels carry the iter-1 L-gap (TF32/no_grad path
  #     interaction in forward_pair_with_shared_noise). seq channel is
  #     unaffected — softmax+KL not matmul-heavy.
  #   * The seqonly canary (loss_weights {0,0,1}, otherwise default)
  #     achieved the best val of all 5 prior runs:
  #       12.2697 (seqonly) vs 12.3240 (abdpo_match) vs 12.3572 (residue+all).
  #   * Iter-1 baseline collapses to noise (margin +0.07 vs +16.5).
  loss_weights:
    rot: 0.0
    pos: 0.0
    seq: 1.0
  # 10000 iters / batch_size 4 = ~27 epochs over 1492 pairs (vs ~1250
  # epochs over the 192-pair canary at 5k iters). AbDPO precedent is
  # 1-3k iters of converged training on similar-sized data; 10k gives
  # generous early-stop headroom while still finishing within the
  # ~6h budget on a single A100. If early stop fires below 3k, that's
  # the expected outcome — bump only if val DPO loss is still trending
  # at iter 10k.
  max_iters: 10000
  val_freq: 100
  batch_size: 4
  seed: 42
  # Tighter than the fine-tune's 1.0. The residue-level AbDPO loss
  # with β·T = 5 (0.05 × 100) can still produce huge gradients on
  # outlier pairs (observed 10k+ raw grad_norms in the canary run);
  # 0.5 cap dampens those spikes more aggressively.
  max_grad_norm: 0.5
  ema_decay: 0.999
  # Seqonly canary best-val was at iter 900 (12.2697) then degraded by
  # iter 1900. With filtered pairs (cleaner signal) we want patience to
  # tolerate slower improvement past the previous plateau.
  early_stop_patience: 30
  save_top_k: 3
  optimizer:
    type: adam
    # 1e-5 — 5× smaller than the fine-tune lr (5e-5). DPO is a small
    # perturbation of an already-converged model; AbDPO §4.5 uses 1e-5.
    lr: 1.0e-5
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.5
    patience: 8
    min_lr: 1.0e-7
  # No LR warmup — DPO starts from a converged checkpoint, no Adam
  # second-moment reset trauma to recover from. The fine-tune needed
  # warmup because its init was the upstream codesign_multicdrs
  # checkpoint with a very different data distribution; here π_θ and
  # the data distribution match because π_θ = π_ref at iter 0.

# ── DPO-specific block ────────────────────────────────────────────────
dpo:
  # Reference policy — frozen, used to compute baseline log-prob ratios.
  pi_ref_checkpoint: runs/vhh_ft/seed42_jfix/checkpoints/best_ema.pt

  # Pair training data (output of scripts/dpo/select_pareto_pairs.py).
  # 1492 pairs across 200 GTs from the 2026-05-25 TRAIN+VAL AAPR run.
  # For fast debugging, swap to the test-only canary:
  #   pair_parquet: data/aapr/ftseed42_jfix_K8_20260525/dpo/pairs.parquet  # 192 pairs
  # FILTERED: only pairs where π_ref's L_l_ref > L_w_ref. ~35-40% of
  # original pairs drop out — π_ref disagrees with the Pareto label on
  # those, so DPO on them pulls π_θ away from π_ref and destabilises.
  # Generate via:
  #   python scripts/dpo/filter_pairs_by_ref_margin.py \
  #     --pairs data/aapr/ftseed42_jfix_trainval_K8_20260525/dpo/pairs.parquet \
  #     --lwref data/aapr/ftseed42_jfix_trainval_K8_20260525/dpo/lwref_distribution.parquet \
  #     --threshold 0.0
  pair_parquet: data/aapr/ftseed42_jfix_trainval_K8_20260525/dpo/pairs_filtered_marginGTp0.0.parquet

  # DPO temperature. AbDPO Table 1 uses 0.1 as the headline value;
  # Wallace et al. sweep 0.05-0.5. Lowered from 0.1 to 0.05 after the
  # first canary run showed catastrophic destabilization at 0.1:
  # val DPO loss climbed from 12.5 (iter 200, best) to 18 (iter 1100)
  # while train loss oscillated 5-60. With β·T = 0.05 × 100 = 5
  # (vs 10 before), gradient magnitudes drop ~2x and the per-residue
  # logsigmoid penalties become less extreme for outlier residues.
  beta_dpo: 0.5

  # Diffusion horizon T — multiplies δ in the DPO loss (Wallace Eq. 8).
  # Must equal model.diffusion.num_steps; the trainer asserts this.
  num_timesteps: 100

  # Loss aggregation:
  #   "residue"  → AbDPO Eq. 8: log σ per residue, summed per pair.
  #                Recommended default; AbDPO Fig. 4 shows this
  #                converges much better than the sequence-level form.
  #   "sequence" → Wallace-style: sum δ over residues per pair first,
  #                then log σ. Provided as an ablation toggle.
  aggregation: residue

  # Put π_θ in .eval() mode during DPO training. Default true.
  # Rationale: keeping π_θ in .train() activates dropout in the
  # policy, but π_ref is permanently in .eval() (no dropout). At
  # iter 1 with π_θ == π_ref, this asymmetry creates a fake baseline
  # gap on the loser side (observed: L_l_θ − L_l_ref ≈ +2.3 at iter 1
  # in the canary run, vs ~0.13 on the winner side). The DPO loss
  # then chases that fake +margin instead of learning real
  # preferences. Setting π_θ to eval gives clean iter-1 baselines
  # (L_w_θ == L_w_ref, L_l_θ == L_l_ref) and isolates the DPO signal.
  # We lose dropout regularization, but DPO is a small perturbation
  # off a converged π_ref on ~1300 pairs — overfitting risk is
  # already low. Set to false to recover the previous behaviour for
  # ablation comparisons.
  eval_mode_theta: true

  # Train/val split — GT-stratified, holding out N GTs entirely so no
  # pair leaks across the boundary (different pairs from the same GT
  # share the same antigen+framework context). With 200 GTs and ~7.5
  # pairs/GT, 20 holdout GTs ≈ 150 val pairs / 1340 train pairs (10%
  # val). The val pool will be a random mix of fine-tune train-GTs
  # (loser-driven signal, L_w_ref ≈ 0) and val-GTs (symmetric signal,
  # L_w_ref > 0); for a cleaner symmetric-only val signal, set
  # val_gt_ids below to the 34 fine-tune val-GT IDs instead.
  val_gt_holdout: 20
  val_split_seed: 42
  # Optional: explicit list of bare-PDB GT IDs to use as the val pool,
  # overriding val_gt_holdout / val_split_seed. Recommended alternative
  # for the trainval pair pool: list the original fine-tune val-split
  # GTs here so the DPO val set has L_w_ref > 0 (symmetric signal,
  # cleaner early-stop). The DPO train pool then gets all train-split
  # GTs (loser-driven gradient signal — fine, just asymmetric).
  # Generate the list on Snellius with:
  #   python -c "import json; s=json.load(open('data/datasets/clustering/cluster_splits.json')); \
  #              [print(f'    - {e.split(chr(95))[0]}') for e in sorted({e for e in s['splits']['val']})]"
  val_gt_ids: null

  # Defensive: drop pairs whose post-transform generate_flag differs
  # between winner and loser. Should be 0 with the j-fixed pipeline,
  # but exposed so we can switch to "raise" if a regression slips in.
  drop_misaligned: true

  # Per-epoch noise variation. The DPO loss seeds the masking
  # transforms per pair (so winner+loser get the same mask) but
  # combining the per-pair seed with a per-epoch offset lets us sweep
  # CDR subsets across epochs. 0 → fixed across the run; set to
  # `epoch_index` in the trainer for true variation.
  pair_seed_offset: 0

# Dataset block — used to construct the underlying VHHANDDDataset
# whose LMDB the PairDataset reads winners from. The 'train' split is
# the largest of the three splits in cluster_splits.json (176 GTs);
# any non-empty split works because PairDataset's GT lookup iterates
# base_dataset.sabdab_entries (which after _load_structures contains
# all preprocessed entries regardless of split) and filters by
# db_ids. The trainer ignores the 'val' dataset block — DPO's val
# pool is GT-stratified inside the pair parquet, not derived from
# cluster_splits.json.
dataset:
  train:
    type: vhh_andd
    manifest_path: data/datasets/diffab_manifest.tsv
    pdb_dir:       /projects/0/hpmlprjs/interns/krijn/ANDD_nano_dataset_IgLM/VHH_structures_post_diffab
    processed_dir: data/processed/vhh_ft
    splits_path:   data/datasets/clustering/cluster_splits.json
    split: train
    heavy_max_resseq: 150
    # The transforms applied to BOTH winner and loser inside
    # PairDataset.__getitem__. Mirrors the fine-tune's train pipeline
    # so π_θ sees the same input distribution it was fine-tuned on.
    transform:
      - type: mask_multiple_cdrs
      - type: merge_chains
      - type: patch_around_anchor
