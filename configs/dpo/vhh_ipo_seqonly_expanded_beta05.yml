# Brief 18 — IPO at β=0.05 on the EXPANDED pair pool (Brief 07b).
# Clean apples-to-apples vs the expanded π_θ DPO run; provides an IPO
# data-point at the goldilocks β for the expanded campaign.
#
# Inputs:
#   * π_ref:    runs/vhh_ft/seed42_jfix_expanded/checkpoints/best_ema.pt
#               (expanded fine-tune from the Phase-1 campaign; see
#                docs/expanded_ft_campaign_phase1.md)
#   * Pair pool: data/aapr/ftseed42_jfix_expanded_trainval_K8_20260601/dpo/
#                pairs_filtered_marginGTp0.0.parquet (809 pairs after filter)
#   * Dataset LMDB: data/processed/vhh_ft_expanded (the expanded LMDB
#                   built for Brief 05 of the expanded-FT campaign)

model:
  type: diffab
  res_feat_dim: 128
  pair_feat_dim: 64
  diffusion:
    num_steps: 100
    eps_net_opt:
      num_layers: 6
  train_structure: true
  train_sequence: true

train:
  loss_weights:
    rot: 0.0
    pos: 0.0
    seq: 1.0
  max_iters: 5800
  val_freq: 100
  batch_size: 4
  seed: 42
  max_grad_norm: 0.5
  ema_decay: 0.999
  early_stop_patience: 30
  save_top_k: 3
  optimizer:
    type: adam
    lr: 1.0e-5
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.5
    patience: 8
    min_lr: 1.0e-7

dpo:
  # EXPANDED π_ref (Brief 07b / expanded-FT Phase 1).
  pi_ref_checkpoint: runs/vhh_ft/seed42_jfix_expanded/checkpoints/best_ema.pt

  # EXPANDED pair pool — 809 pairs after ref-margin filter.
  pair_parquet: data/aapr/ftseed42_jfix_expanded_trainval_K8_20260601/dpo/pairs_filtered_marginGTp0.0.parquet

  objective: ipo
  beta_dpo: 0.05
  num_timesteps: 100
  aggregation: residue
  eval_mode_theta: true
  val_gt_holdout: 20
  val_split_seed: 42
  val_gt_ids: null
  drop_misaligned: true
  pair_seed_offset: 0

dataset:
  train:
    type: vhh_andd
    # EXPANDED manifest + LMDB + splits (mirrors configs/diffab_ft/vhh_ft_expanded.yml).
    manifest_path: data/datasets/diffab_manifest_expanded.tsv
    pdb_dir:       data/raw/vhh_combined
    processed_dir: data/processed/vhh_ft_expanded
    splits_path:   data/datasets/clustering/cluster_splits_expanded.json
    split: train
    heavy_max_resseq: 150
    transform:
      - type: mask_multiple_cdrs
      - type: merge_chains
      - type: patch_around_anchor
